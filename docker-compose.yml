services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ecocoleta
      POSTGRES_USER: ecocoleta
      POSTGRES_PASSWORD: ecocoleta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecocoleta"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8082:8080"
    environment:
      DB_HOST: postgres
      DB_NAME: ecocoleta
      DB_USER: ecocoleta
      DB_PASS: ecocoleta
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: mude-essa-chave-em-producao-32chars
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./worker
    ports:
      - "8081:8081"
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - worker

volumes:
  postgres_data:
